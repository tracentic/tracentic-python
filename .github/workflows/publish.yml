name: Publish to PyPI

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Derive version from tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0.dev0+${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify pyproject.toml version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          pkg_version=$(python -c "import tomllib,sys; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [[ "$pkg_version" != "${{ steps.version.outputs.version }}" ]]; then
            echo "pyproject.toml version ($pkg_version) does not match tag (${{ steps.version.outputs.version }})" >&2
            exit 1
          fi

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,starlette]" build twine

      - name: Lint
        run: ruff check .

      - name: Type-check
        run: mypy src

      - name: Test
        run: pytest -q

      - name: Build
        run: |
          rm -rf dist/
          python -m build

      - name: Check distributions
        run: twine check dist/*

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
